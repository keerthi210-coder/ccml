{% extends 'base.html' %}
{% block title %}Login — CCMC{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.1);padding:40px;width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:40px;margin-bottom:8px;">🎓</div>
      <h2 style="font-size:24px;font-weight:800;color:var(--primary);">CCMC Login</h2>
      <p style="color:var(--text-muted);font-size:14px;">Welcome back! Please log in to continue.</p>
    </div>
    <a href="{{ url_for('google_login') }}" class="btn-google" style="margin:0 0 16px;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="G"/>
      Continue with Google
    </a>
    <div class="modal-divider"><span>or login with email</span></div>
    {% if error %}
    <div style="background:#ffebee;color:#c62828;padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:14px;">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('direct_login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-modal-submit">Log In</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-muted);">
      Don't have an account? <a href="{{ url_for('index') }}" style="color:var(--primary);font-weight:600;">Sign Up via Home Page</a>
    </div>
  </div>
</div>
{% endblock %}
